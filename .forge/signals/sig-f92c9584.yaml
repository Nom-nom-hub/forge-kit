  observation: |
    The TTY-detect/fallback-defaults pattern used for interactive forge init
    preserved backward compatibility for CI/pipe usage without any extra effort.
    By detecting sys.stdin.isatty() and falling back to copilot+bash defaults,
    existing scripts and CI pipelines continued working identically. This
    architectural pattern (interactive when human-present, default when piped)
    is effective for CLI tooling and should be the standard for any future
    interactive features.
  evidence:
    - type: text
      content: "echo '' | forge init /tmp/test --force confirmed non-TTY fallback works without hanging or prompting"
